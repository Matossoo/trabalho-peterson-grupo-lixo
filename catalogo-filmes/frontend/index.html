<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Catálogo de Filmes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">
        🎬 Catálogo de Filmes
    </h1>

    <div class="card p-4">

        <h3>Novo Filme</h3>

        <input id="titulo" class="form-control mb-2" placeholder="Título">

        <textarea id="sinopse" class="form-control mb-2" placeholder="Sinopse"></textarea>

        <input id="ano" type="number" class="form-control mb-2" placeholder="Ano">

        <input id="duracao" type="number" class="form-control mb-2" placeholder="Duração">

        <input id="classificacao" class="form-control mb-2" placeholder="Classificação">

        <input id="diretor" type="number" class="form-control mb-2" placeholder="ID Diretor">

        <input id="genero" type="number" class="form-control mb-2" placeholder="ID Gênero">

        <button class="btn btn-success" onclick="salvar()">

            Salvar Filme

        </button>

    </div>

    <hr>

    <table class="table table-striped">

        <thead>

            <tr>

                <th>ID</th>

                <th>Título</th>

                <th>Diretor</th>

                <th>Gênero</th>

                <th>Ano</th>

                <th>Ações</th>

            </tr>

        </thead>

        <tbody id="tabela">

        </tbody>

    </table>

</div>

<script src="js/script.js"></script>

</body>

</html>
